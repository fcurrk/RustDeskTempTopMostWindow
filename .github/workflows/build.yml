name: build

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target'
        required: true
        type: string
        default: 'windows-2022'
      configuration:
        description: 'Configuration'
        required: true
        type: string
        default: 'Release'
      platform:
        description: 'Platform'
        required: true
        type: string
        default: 'x64'
      target_version:
        description: 'TargetVersion'
        required: true
        type: string
        default: 'Windows10'
  workflow_call:
    inputs:
      target:
        description: 'Target'
        required: true
        type: string
        default: 'windows-2022'
      configuration:
        description: 'Configuration'
        required: true
        type: string
        default: 'Release'
      platform:
        description: 'Platform'
        required: true
        type: string
        default: 'x64'
      target_version:
        description: 'TargetVersion'
        required: true
        type: string
        default: 'Windows10'

env:
  solution_path: TempTopMostWindow.sln

jobs:
  build:
    runs-on: ${{ inputs.target }}
    env:
      dist_dir: TempTopMostWindow_${{ inputs.platform }}
      dist_file: TempTopMostWindow_${{ inputs.platform }}.zip
      build_output_dir: ${{ inputs.platform }}/${{ inputs.configuration }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build the solution
        run: |
          msbuild ${{ env.solution_path }} -p:Configuration=${{ inputs.configuration }} -p:Platform=${{ inputs.platform }} /p:TargetVersion=${{ inputs.target_version }}

      - name: Zip files and generate checksums
        shell: pwsh
        run: |
          # 创建分发目录
          New-Item -ItemType Directory -Force -Path ${{ env.dist_dir }} | Out-Null
          
          # 移动构建产物
          Move-Item -Path "./${{ env.build_output_dir }}/Img2Mem.exe" -Destination "${{ env.dist_dir }}" -Force
          Move-Item -Path "./${{ env.build_output_dir }}/TestApp.exe" -Destination "${{ env.dist_dir }}" -Force
          Move-Item -Path "./${{ env.build_output_dir }}/TestAppDebug.exe" -Destination "${{ env.dist_dir }}" -Force
          Move-Item -Path "./${{ env.build_output_dir }}/WindowInjection.dll" -Destination "${{ env.dist_dir }}" -Force
          Copy-Item -Path "./README.md" -Destination "${{ env.dist_dir }}" -Force

          # 查找 vswhere
          $vswherePath = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswherePath)) {
            Write-Error "vswhere.exe not found at $vswherePath"
            exit 1
          }

          # 根据平台确定运行时目录
          if ("${{ inputs.platform }}" -eq "ARM64") {
            $runtimeDirs = @(
              "VC\Tools\**\bin\HostARM64\ARM64",
              "VC\Tools\**\bin\Hostx64\arm64",
              "VC\Tools\**\bin\HostX64\arm64"
            )
          } else {
            $runtimeDirs = @(
              "VC\Tools\**\bin\HostX64\x64",
              "VC\Tools\**\bin\Hostx64\x64"
            )
          }

          function Find-RuntimeDll([string]$dllName) {
            foreach ($runtimeDir in $runtimeDirs) {
              $matches = @(& $vswherePath -latest -requires Microsoft.Component.MSBuild -find "$runtimeDir\$dllName")
              if ($matches.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($matches[-1])) {
                return $matches[-1]
              }
            }
            Write-Error "Unable to locate $dllName for platform ${{ inputs.platform }}. Tried: $($runtimeDirs -join ', ')"
            exit 1
          }

          # 复制运行时 DLL
          Copy-Item -Path (Find-RuntimeDll "msvcp140.dll") -Destination "${{ env.dist_dir }}" -Force
          Copy-Item -Path (Find-RuntimeDll "vcruntime140.dll") -Destination "${{ env.dist_dir }}" -Force
          Copy-Item -Path (Find-RuntimeDll "vcruntime140_1.dll") -Destination "${{ env.dist_dir }}" -Force

          # 列出文件并生成 SHA256
          Get-ChildItem -Path "${{ env.dist_dir }}" -Recurse -File | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
            Write-Output "$hash $($_.FullName)"
          }

          # 压缩
          Compress-Archive -Path "${{ env.dist_dir }}/*" -DestinationPath "${{ env.dist_file }}" -Force

          # 生成压缩包校验和
          (Get-FileHash -Path "${{ env.dist_file }}" -Algorithm MD5).Hash | Out-File -FilePath "${{ env.dist_file }}.checksum_md5" -Encoding ascii
          (Get-FileHash -Path "${{ env.dist_file }}" -Algorithm SHA256).Hash | Out-File -FilePath "${{ env.dist_file }}.checksum_sha256" -Encoding ascii

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: topmostwindow-artifacts-${{ inputs.platform }}
          path: |
            ${{ env.dist_file }}
            ${{ env.dist_file }}.checksum_md5
            ${{ env.dist_file }}.checksum_sha256